<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Loja Optimus Tech | Produtos Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root { 
            --primary: #00ff88; 
            --bg: #050505; 
            --card-bg: #0f0f0f; 
            --text: #fff;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }
        
        html {
            font-size: clamp(14px, 3vw, 16px);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            overflow-x: hidden;
            line-height: 1.6;
        }
        
        /* ===== HEADER ===== */
        header { 
            position: fixed; 
            width: 100%; 
            top: 0; 
            background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid #1f1f1f; 
            z-index: 1000;
            padding: 0;
        }
        
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            max-width: 1300px; 
            margin: 0 auto; 
            padding: clamp(12px, 3vw, 15px) clamp(15px, 4vw, 20px);
            width: 100%;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .logo { 
            color: var(--primary); 
            font-weight: 900; 
            font-size: clamp(1rem, 5vw, 1.5rem); 
            text-transform: uppercase; 
            letter-spacing: clamp(1px, 2vw, 2px); 
            cursor: pointer;
            white-space: nowrap;
        }
        
        .nav-links { 
            display: flex; 
            align-items: center; 
            gap: clamp(8px, 2vw, 15px);
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .nav-links a { 
            color: #888; 
            text-decoration: none; 
            font-size: clamp(0.65rem, 2vw, 0.75rem); 
            font-weight: bold; 
            transition: 0.3s; 
            cursor: pointer; 
            text-transform: uppercase;
            white-space: nowrap;
        }
        
        .nav-links a:hover, 
        .nav-links a:active { 
            color: var(--primary); 
        }
        
        .nav-contact { 
            color: var(--primary) !important; 
            border: 1px solid rgba(0,255,136,0.2); 
            padding: clamp(4px, 1vw, 8px);
            border-radius: 5px;
            font-size: clamp(0.6rem, 1.5vw, 0.7rem) !important;
            display: inline-flex;
            align-items: center;
        }

        /* ===== HERO LOJA ===== */
        .hero-loja { 
            height: clamp(30vh, 50vh, 45vh); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            background: radial-gradient(circle at center, #0a1f14 0%, #000 100%); 
            padding: clamp(20px, 4vw, 30px);
            margin-top: clamp(60px, 10vw, 75px);
        }
        
        .hero-loja h1 { 
            font-size: clamp(1.8rem, 8vw, 4rem); 
            color: var(--primary); 
            margin-bottom: clamp(8px, 2vw, 10px);
            letter-spacing: clamp(1px, 1vw, 2px);
        }
        
        .hero-loja p { 
            color: #666; 
            font-size: clamp(0.85rem, 3vw, 0.95rem);
        }

        /* ===== CONTAINER ===== */
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: clamp(25px, 5vw, 40px) clamp(15px, 4vw, 15px);
        }
        
        /* ===== HEADER PRODUTOS - CENTRALIZADO ===== */
        .produtos-header {
            display: flex; 
            justify-content: center;
            align-items: center; 
            margin-bottom: clamp(20px, 4vw, 30px); 
            flex-wrap: wrap; 
            gap: clamp(15px, 3vw, 25px);
            position: relative;
        }
        
        .section-title { 
            font-size: clamp(1.3rem, 5vw, 1.8rem); 
            color: var(--primary); 
            margin: 0;
            text-align: center;
            flex: 0 0 auto;
        }
        
        .btn-voltar-container {
            position: absolute;
            right: 0;
            top: 0;
        }

        /* ===== FILTROS ===== */
        .filtros { 
            display: flex; 
            justify-content: center; 
            gap: clamp(8px, 2vw, 10px); 
            margin-bottom: clamp(25px, 5vw, 35px); 
            flex-wrap: wrap; 
            padding: 0 clamp(10px, 2vw, 10px);
        }
        
        .filtro-btn { 
            background: #1a1a1a; 
            color: #888; 
            border: 1px solid #333; 
            padding: clamp(8px, 2vw, 10px) clamp(14px, 3vw, 18px); 
            border-radius: 25px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-weight: bold; 
            font-size: clamp(0.75rem, 2.5vw, 0.85rem);
            touch-action: manipulation;
            white-space: nowrap;
        }
        
        .filtro-btn:hover, 
        .filtro-btn.active { 
            background: var(--primary); 
            color: #000; 
            border-color: var(--primary); 
        }

        /* ===== GRID PRODUTOS ===== */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(clamp(130px, 35vw, 160px), 1fr)); 
            gap: clamp(14px, 2.5vw, 18px); 
            padding: 0 clamp(5px, 1vw, 5px);
            margin-bottom: clamp(30px, 6vw, 50px);
        }
        
        /* ===== CARDS PRODUTOS ===== */
        .produto-card { 
            background: var(--card-bg); 
            border-radius: clamp(12px, 3vw, 15px); 
            overflow: hidden; 
            border: 1px solid #1a1a1a; 
            transition: 0.4s ease-out;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .produto-card:hover, 
        .produto-card:active { 
            transform: translateY(-8px); 
            border-color: var(--primary); 
        }
        
        .produto-img { 
            width: 100%; 
            height: clamp(100px, 28vw, 160px); 
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: clamp(2.2rem, 9vw, 3.2rem); 
            color: var(--primary);
        }
        
        .produto-info { 
            padding: clamp(12px, 3vw, 15px);
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        
        .produto-nome { 
            font-size: clamp(0.85rem, 2.2vw, 0.95rem); 
            font-weight: 700; 
            margin-bottom: clamp(6px, 1.5vw, 8px);
            text-align: center;
            line-height: 1.3;
            word-break: break-word;
        }
        
        .produto-desc { 
            color: #aaa; 
            font-size: clamp(0.7rem, 2vw, 0.75rem); 
            line-height: 1.35; 
            margin-bottom: clamp(8px, 2vw, 10px);
            text-align: center;
        }
        
        .produto-preco { 
            font-size: clamp(0.95rem, 3vw, 1.2rem); 
            color: var(--primary); 
            font-weight: 900; 
            margin-bottom: clamp(10px, 2vw, 12px);
            text-align: center;
        }
        
        .produto-preco-old { 
            text-decoration: line-through; 
            color: #555; 
            font-size: clamp(0.6rem, 1.8vw, 0.7rem); 
            margin-right: 4px; 
        }

        .avaliacao { 
            display: flex; 
            align-items: center; 
            gap: 3px; 
            margin-bottom: clamp(8px, 2vw, 10px); 
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .estrela { 
            color: #ffc107; 
            font-size: clamp(0.65rem, 2vw, 0.8rem);
        }
        
        .nota { 
            color: #aaa; 
            font-size: clamp(0.6rem, 1.8vw, 0.7rem);
        }

        .btn-comprar { 
            background: linear-gradient(135deg, #ff6b00, #ff8c00); 
            color: #fff; 
            border: none; 
            padding: clamp(8px, 2vw, 10px) clamp(12px, 2vw, 15px); 
            border-radius: clamp(6px, 2vw, 8px); 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
            width: 100%; 
            margin-bottom: 0; 
            font-size: clamp(0.65rem, 2vw, 0.75rem);
            touch-action: manipulation;
        }
        
        .btn-comprar:hover, 
        .btn-comprar:active { 
            background: linear-gradient(135deg, #ff8c00, #ffa500); 
            transform: scale(1.02); 
        }

        /* ===== CARRINHO FLUTUANTE ===== */
        #carrinho-flutuante { 
            position: fixed; 
            bottom: clamp(25px, 5vw, 30px); 
            right: clamp(25px, 5vw, 30px); 
            background: linear-gradient(135deg, #ff6b00, #ff8c00); 
            width: clamp(55px, 12vw, 60px); 
            height: clamp(55px, 12vw, 60px); 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
            box-shadow: 0 15px 40px rgba(255, 107, 0, 0.6); 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: clamp(24px, 6vw, 28px); 
            color: #fff;
            touch-action: manipulation;
        }
        
        #carrinho-flutuante:hover, 
        #carrinho-flutuante:active { 
            transform: scale(1.1); 
        }
        
        .carrinho-badge { 
            position: absolute; 
            top: -5px; 
            right: -5px; 
            background: #ff0000; 
            color: #fff; 
            border-radius: 50%; 
            width: clamp(20px, 5vw, 22px); 
            height: clamp(20px, 5vw, 22px); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: clamp(0.65rem, 2vw, 0.75rem);
        }

        /* ===== MODAL CARRINHO ===== */
        #modal-carrinho { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.9); 
            display: none; 
            z-index: 2000; 
            justify-content: flex-end;
            align-items: flex-start;
        }
        
        .carrinho-modal { 
            width: 100%; 
            max-width: clamp(280px, 95vw, 420px); 
            height: 100%; 
            max-height: 100vh;
            background: #0a0a0a; 
            display: flex; 
            flex-direction: column; 
            border-left: 2px solid var(--primary);
            overflow: hidden;
        }
        
        .carrinho-header { 
            background: linear-gradient(135deg, #ff6b00, #ff8c00); 
            padding: clamp(14px, 3vw, 18px); 
            color: #fff; 
            font-weight: bold; 
            font-size: clamp(1rem, 3vw, 1.2rem); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            flex-shrink: 0;
        }
        
        .carrinho-header button { 
            background: none; 
            border: none; 
            color: #fff; 
            font-size: clamp(1.2rem, 4vw, 1.5rem); 
            cursor: pointer;
            padding: 4px;
            touch-action: manipulation;
        }
        
        .carrinho-items { 
            flex: 1; 
            overflow-y: auto; 
            padding: clamp(12px, 3vw, 15px);
            -webkit-overflow-scrolling: touch;
        }
        
        .carrinho-item { 
            background: #1a1a1a; 
            padding: clamp(10px, 2vw, 12px); 
            border-radius: clamp(8px, 2vw, 10px); 
            margin-bottom: clamp(10px, 2vw, 12px); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #333; 
            gap: 8px;
        }
        
        .item-info { 
            flex: 1;
            min-width: 0;
        }
        
        .item-nome { 
            font-weight: bold; 
            margin-bottom: clamp(3px, 1vw, 4px); 
            font-size: clamp(0.85rem, 2vw, 0.9rem);
            word-break: break-word;
        }
        
        .item-preco { 
            color: var(--primary); 
            font-weight: bold; 
            font-size: clamp(0.8rem, 2vw, 0.85rem);
        }
        
        .item-remove { 
            background: #ff4444; 
            color: #fff; 
            border: none; 
            padding: clamp(4px, 1vw, 5px) clamp(6px, 1vw, 8px); 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: clamp(0.65rem, 2vw, 0.75rem); 
            white-space: nowrap;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        
        .carrinho-footer { 
            padding: clamp(12px, 3vw, 15px); 
            border-top: 1px solid #333;
            flex-shrink: 0;
        }
        
        .carrinho-total { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: clamp(12px, 2vw, 15px); 
            font-size: clamp(1rem, 3vw, 1.2rem); 
            font-weight: bold;
        }
        
        .btn-finalizar { 
            background: linear-gradient(135deg, #00ff88, #00cc6e); 
            color: #000; 
            border: none; 
            padding: clamp(10px, 2vw, 12px); 
            border-radius: clamp(8px, 2vw, 10px); 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            width: 100%; 
            font-size: clamp(0.85rem, 2vw, 0.9rem);
            touch-action: manipulation;
        }
        
        .btn-finalizar:hover, 
        .btn-finalizar:active { 
            background: linear-gradient(135deg, #00cc6e, #00aa55); 
        }

        .carrinho-vazio { 
            text-align: center; 
            padding: clamp(20px, 4vw, 30px) clamp(12px, 3vw, 15px); 
            color: #666;
        }
        
        .carrinho-vazio i { 
            font-size: clamp(2rem, 8vw, 2.5rem); 
            margin-bottom: clamp(12px, 2vw, 15px); 
            display: block;
        }

        .btn-voltar { 
            background: var(--primary); 
            color: #000; 
            border: none; 
            padding: clamp(8px, 2vw, 10px) clamp(15px, 3vw, 20px); 
            border-radius: clamp(6px, 2vw, 8px); 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: clamp(0.7rem, 2vw, 0.8rem); 
            transition: 0.3s;
            white-space: nowrap;
            touch-action: manipulation;
        }
        
        .btn-voltar:hover, 
        .btn-voltar:active { 
            background: #fff; 
        }

        /* ===== BOTÃO TOPO ===== */
        #btnTopo { 
            display: none; 
            position: fixed; 
            bottom: clamp(80px, 15vw, 100px); 
            left: clamp(15px, 3vw, 20px); 
            z-index: 99999; 
            border: 2px solid var(--primary); 
            background: rgba(0,0,0,0.9); 
            color: var(--primary); 
            cursor: pointer; 
            width: clamp(40px, 10vw, 45px); 
            height: clamp(40px, 10vw, 45px); 
            border-radius: 50%; 
            font-size: clamp(16px, 4vw, 18px); 
            transition: 0.3s; 
            backdrop-filter: blur(10px); 
            align-items: center; 
            justify-content: center;
            touch-action: manipulation;
        }
        
        #btnTopo:hover, 
        #btnTopo:active { 
            background: var(--primary); 
            color: #000; 
        }

        /* ===== FOOTER ===== */
        footer { 
            text-align: center; 
            padding: clamp(20px, 4vw, 30px) clamp(15px, 4vw, 15px); 
            color: #444; 
            font-size: clamp(0.65rem, 2vw, 0.75rem); 
            border-top: 1px solid #111;
        }

        /* ===== MEDIA QUERIES ===== */
        @media (max-width: 768px) {
            html {
                font-size: 14px;
            }

            nav {
                padding: 10px 12px;
            }

            .hero-loja {
                height: 35vh;
                margin-top: 60px;
                padding: 20px 15px;
            }

            .container {
                padding: 25px 12px;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }

            .produtos-header {
                flex-direction: column;
                gap: 15px;
            }

            .btn-voltar-container {
                position: static;
                width: 100%;
            }

            .btn-voltar {
                width: 100%;
            }

            #modal-carrinho {
                justify-content: center;
            }

            .carrinho-modal {
                width: 95%;
                max-width: 100%;
                max-height: 85vh;
                border-left: none;
                border-top: 2px solid var(--primary);
            }

            #btnTopo {
                bottom: 70px;
                left: 12px;
            }

            #carrinho-flutuante {
                width: 50px;
                height: 50px;
                font-size: 22px;
            }
        }

        @media (max-width: 480px) {
            html {
                font-size: 13px;
            }

            nav {
                padding: 8px 10px;
            }

            .logo {
                font-size: 0.9rem;
                letter-spacing: 0.5px;
            }

            .nav-links {
                gap: 5px;
                width: 100%;
            }

            .nav-links a {
                font-size: 0.6rem;
            }

            .hero-loja {
                height: 30vh;
                margin-top: 50px;
                padding: 15px 12px;
            }

            .hero-loja h1 {
                font-size: 1.5rem;
                margin-bottom: 6px;
            }

            .hero-loja p {
                font-size: 0.8rem;
            }

            .container {
                padding: 20px 10px;
            }

            .section-title {
                font-size: 1.2rem;
                margin: 0;
            }

            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .produto-card {
                border-radius: 10px;
            }

            .produto-img {
                height: 90px;
                font-size: 1.6rem;
            }

            .produto-nome {
                font-size: 0.8rem;
            }

            .produto-desc {
                font-size: 0.65rem;
            }

            .price {
                font-size: 0.9rem;
            }

            .btn-comprar {
                font-size: 0.6rem;
                padding: 6px 8px;
            }

            .filtros {
                gap: 6px;
            }

            .filtro-btn {
                padding: 6px 10px;
                font-size: 0.65rem;
            }

            #modal-carrinho {
                justify-content: center;
            }

            .carrinho-modal {
                width: 98%;
                max-height: 80vh;
                border-top: 2px solid var(--primary);
                border-left: none;
            }

            .carrinho-header {
                font-size: 1rem;
            }

            .item-nome {
                font-size: 0.8rem;
            }

            .item-preco {
                font-size: 0.75rem;
            }

            .carrinho-total {
                font-size: 1rem;
            }

            .btn-finalizar {
                font-size: 0.8rem;
            }

            #btnTopo {
                bottom: 60px;
                left: 10px;
                width: 38px;
                height: 38px;
                font-size: 14px;
            }

            #carrinho-flutuante {
                bottom: 20px;
                right: 15px;
                width: 48px;
                height: 48px;
                font-size: 20px;
            }

            .btn-voltar {
                padding: 8px 12px;
                font-size: 0.65rem;
                width: 100%;
            }

            .produtos-header {
                flex-direction: column;
                gap: 12px;
            }

            .btn-voltar-container {
                width: 100%;
            }
        }

        @media (max-height: 600px) and (orientation: landscape) {
            .hero-loja {
                height: 30vh;
            }

            #btnTopo {
                bottom: 60px;
            }

            header {
                position: sticky;
            }
        }
    </style>
</head>
<body>

<button onclick="topo()" id="btnTopo"><i class="fas fa-arrow-up"></i></button>

<header>
    <nav>
        <div class="logo" onclick="window.location.href='index.html'">OPTIMUS TECH</div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="index.html#mobile">SERVIÇOS</a>
            <a href="index.html#agendar">AGENDAR</a>
            <a href="mailto:optimustech.support@gmail.com" class="nav-contact"><i class="far fa-envelope"></i></a>
            <a href="https://wa.me/5542999112756" class="nav-contact" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </nav>
</header>

<section class="hero-loja">
    <h1>🛒 LOJA OPTIMUS</h1>
    <p>Produtos Premium para sua Performance</p>
</section>

<div class="container">
    <div class="produtos-header">
        <h2 class="section-title">Produtos</h2>
        <div class="btn-voltar-container">
            <a href="index.html" class="btn-voltar">← Voltar</a>
        </div>
    </div>
    
    <div class="filtros">
        <button class="filtro-btn active" onclick="filtrar('todos')">Todos</button>
        <button class="filtro-btn" onclick="filtrar('ssd')">SSD</button>
        <button class="filtro-btn" onclick="filtrar('ram')">Memória RAM</button>
        <button class="filtro-btn" onclick="filtrar('perifericos')">Periféricos</button>
        <button class="filtro-btn" onclick="filtrar('monitores')">Monitores</button>
        <button class="filtro-btn" onclick="filtrar('notebooks')">Notebooks</button>
        <button class="filtro-btn" onclick="filtrar('acessorios')">Acessórios</button>
    </div>

    <div class="grid" id="produtos-grid">
        <!-- Produtos inseridos aqui -->
    </div>
</div>

<div id="carrinho-flutuante" onclick="abrirCarrinho()">
    <i class="fas fa-shopping-cart"></i>
    <div class="carrinho-badge" id="carrinho-count">0</div>
</div>

<div id="modal-carrinho" onclick="fecharCarrinho(event)">
    <div class="carrinho-modal" onclick="event.stopPropagation()">
        <div class="carrinho-header">
            Meu Carrinho
            <button onclick="fecharCarrinho()">✕</button>
        </div>
        <div class="carrinho-items" id="carrinho-items">
            <div class="carrinho-vazio">
                <i class="fas fa-shopping-cart"></i>
                <p>Seu carrinho está vazio</p>
            </div>
        </div>
        <div class="carrinho-footer">
            <div class="carrinho-total">
                <span>Total:</span>
                <span id="carrinho-total">R$ 0,00</span>
            </div>
            <button class="btn-finalizar" onclick="finalizarCompra()">Finalizar</button>
        </div>
    </div>
</div>

<footer>© 2026 OPTIMUS TECH - TODOS OS DIREITOS RESERVADOS</footer>
<script>
    const produtos = [

    let carrinho = [];

    function renderProdutos(categoria = 'todos') {
        const grid = document.getElementById('produtos-grid');
        grid.innerHTML = '';
        
        const produtosFiltrados = categoria === 'todos' 
            ? produtos 
            : produtos.filter(p => p.categoria === categoria);
        
        if (produtosFiltrados.length === 0) {
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #666; padding: 40px 20px;">Nenhum produto encontrado nesta categoria</p>';
            return;
        }
        
        produtosFiltrados.forEach(produto => {
            const stars = '⭐'.repeat(Math.floor(produto.avaliacao));
            grid.innerHTML += `
                <div class="produto-card">
                    <div class="produto-img">${produto.icon}</div>
                    <div class="produto-info">
                        <div class="produto-nome">${produto.nome}</div>
                        <div class="produto-desc">${produto.descricao}</div>
                        <div class="produto-preco">
                            <span class="produto-preco-old">R$ ${produto.precoAntigo.toFixed(2)}</span>
                            R$ ${produto.preco.toFixed(2)}
                        </div>
                        <div class="avaliacao">
                            <span class="estrela">${stars}</span>
                            <span class="nota">(${produto.reviews})</span>
                        </div>
                        <button class="btn-comprar" onclick="adicionarAoCarrinho(${produto.id})">Comprar</button>
                    </div>
                </div>
            `;
        });
    }

    function filtrar(categoria) {
        document.querySelectorAll('.filtro-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderProdutos(categoria);
    }

    function adicionarAoCarrinho(produtoId) {
        const produto = produtos.find(p => p.id === produtoId);
        const itemExistente = carrinho.find(c => c.id === produtoId);
        
        if (itemExistente) {
            itemExistente.quantidade++;
        } else {
            carrinho.push({...produto, quantidade: 1});
        }
        
        atualizarCarrinho();
        
        const btn = event.target;
        const originalText = btn.textContent;
        btn.textContent = '✓ Adicionado!';
        btn.style.background = 'linear-gradient(135deg, #00ff88, #00cc6e)';
        setTimeout(() => {
            btn.textContent = originalText;
            btn.style.background = 'linear-gradient(135deg, #ff6b00, #ff8c00)';
        }, 1500);
    }

    function removerDoCarrinho(produtoId) {
        carrinho = carrinho.filter(c => c.id !== produtoId);
        atualizarCarrinho();
    }

    function atualizarCarrinho() {
        const total = carrinho.reduce((acc, item) => acc + item.quantidade, 0);
        document.getElementById('carrinho-count').textContent = total;
        renderCarrinho();
    }

    function renderCarrinho() {
        const container = document.getElementById('carrinho-items');
        const total = carrinho.reduce((acc, item) => acc + (item.preco * item.quantidade), 0);
        
        if (carrinho.length === 0) {
            container.innerHTML = `
                <div class="carrinho-vazio">
                    <i class="fas fa-shopping-cart"></i>
                    <p>Seu carrinho está vazio</p>
                </div>
            `;
            document.getElementById('carrinho-total').textContent = 'R$ 0,00';
            return;
        }
        
        container.innerHTML = carrinho.map(item => `
            <div class="carrinho-item">
                <div class="item-info">
                    <div class="item-nome">${item.nome}</div>
                    <div class="item-preco">R$ ${item.preco.toFixed(2)} x${item.quantidade}</div>
                </div>
                <button class="item-remove" onclick="removerDoCarrinho(${item.id})">✕</button>
            </div>
        `).join('');
        
        document.getElementById('carrinho-total').textContent = `R$ ${total.toFixed(2)}`;
    }

    function abrirCarrinho() {
        document.getElementById('modal-carrinho').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function fecharCarrinho(e) {
        if (e && e.target.id !== 'modal-carrinho') return;
        document.getElementById('modal-carrinho').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function finalizarCompra() {
        if (carrinho.length === 0) {
            alert('Carrinho vazio!');
            return;
        }
        
        const total = carrinho.reduce((acc, item) => acc + (item.preco * item.quantidade), 0);
        const itens = carrinho.map(c => `${c.nome} (${c.quantidade}x) - R$ ${(c.preco * c.quantidade).toFixed(2)}`).join('\n');
        const mensagem = `Olá! Gostaria de comprar:\n\n${itens}\n\n*TOTAL: R$ ${total.toFixed(2)}*\n\nPor favor, confirme a disponibilidade e o prazo de entrega.`;
        
        window.open(`https://wa.me/5542999112756?text=${encodeURIComponent(mensagem)}`, '_blank');
        
        carrinho = [];
        atualizarCarrinho();
        fecharCarrinho();
    }

    window.onscroll = () => {
        const btnTopo = document.getElementById("btnTopo");
        const scrollTop = document.body.scrollTop || document.documentElement.scrollTop;
        btnTopo.style.display = (scrollTop > 200) ? "flex" : "none";
    };
    
    function topo() { 
        window.scrollTo({top: 0, behavior: 'smooth'}); 
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderProdutos();
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            fecharCarrinho();
        }
    });

    document.addEventListener('touchmove', (e) => {
        const modal = document.getElementById('modal-carrinho');
        if (modal.style.display === 'flex') {
            const carrinhoItems = document.getElementById('carrinho-items');
            if (!carrinhoItems.contains(e.target)) {
                e.preventDefault();
            }
        }
    }, { passive: false });

    window.addEventListener('orientationchange', () => {
        setTimeout(() => {
            window.scrollTo(0, 0);
        }, 100);
    });

</script>
