let carrinho = [];
let lastScrollTop = 0;

window.addEventListener('scroll', () => {
    const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    const btnTopo = document.getElementById('btnTopo');
    
    if (scrollTop > 200) {
        btnTopo.style.display = 'flex';
    } else {
        btnTopo.style.display = 'none';
    }
    
    lastScrollTop = scrollTop;
});

function renderProdutos(categoria = 'todos') {
    const grid = document.getElementById('produtos-grid');
    grid.innerHTML = '';
    
    const produtosFiltrados = categoria === 'todos' ? produtos : produtos.filter(p => p.categoria === categoria);
    
    produtosFiltrados.forEach(produto => {
        const stars = '⭐'.repeat(Math.floor(produto.avaliacao));
        grid.innerHTML += `<div class="produto-card"><div class="produto-img">${produto.icon}</div><div class="produto-info"><div class="produto-nome">${produto.nome}</div><div class="produto-desc">${produto.descricao}</div><div class="produto-preco"><span class="produto-preco-old">R$ ${produto.precoAntigo.toFixed(2)}</span>R$ ${produto.preco.toFixed(2)}</div><div class="avaliacao"><span class="estrela">${stars}</span><span class="nota">(${produto.reviews})</span></div><button class="btn-comprar" onclick="adicionarAoCarrinho(${produto.id})">Comprar</button></div></div>`;
    });
}

function filtrar(categoria) {
    document.querySelectorAll('.filtro-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderProdutos(categoria);
}

function adicionarAoCarrinho(produtoId) {
    const produto = produtos.find(p => p.id === produtoId);
    const itemExistente = carrinho.find(c => c.id === produtoId);
    
    if (itemExistente) {
        itemExistente.quantidade++;
    } else {
        carrinho.push({...produto, quantidade: 1});
    }
    
    atualizarCarrinho();
    
    const btn = event.target;
    const originalText = btn.textContent;
    btn.textContent = '✓ Adicionado!';
    btn.style.background = 'linear-gradient(135deg, #00ff88, #00cc6e)';
    setTimeout(() => {
        btn.textContent = originalText;
        btn.style.background = 'linear-gradient(135deg, #ff6b00, #ff8c00)';
    }, 1500);
}

function removerDoCarrinho(produtoId) {
    carrinho = carrinho.filter(c => c.id !== produtoId);
    atualizarCarrinho();
}

function atualizarCarrinho() {
    const total = carrinho.reduce((acc, item) => acc + item.quantidade, 0);
    document.getElementById('carrinho-count').textContent = total;
    renderCarrinho();
}

function renderCarrinho() {
    const container = document.getElementById('carrinho-items');
    const total = carrinho.reduce((acc, item) => acc + (item.preco * item.quantidade), 0);
    
    if (carrinho.length === 0) {
        container.innerHTML = `<div class="carrinho-vazio"><i class="fas fa-shopping-cart"></i><p>Seu carrinho está vazio</p></div>`;
        document.getElementById('carrinho-total').textContent = 'R$ 0,00';
        return;
    }
    
    container.innerHTML = carrinho.map(item => `<div class="carrinho-item"><div class="item-info"><div class="item-nome">${item.nome}</div><div class="item-preco">R$ ${item.preco.toFixed(2)} x${item.quantidade}</div></div><button class="item-remove" onclick="removerDoCarrinho(${item.id})">✕</button></div>`).join('');
    
    document.getElementById('carrinho-total').textContent = `R$ ${total.toFixed(2)}`;
}

function abrirCarrinho() {
    document.getElementById('modal-carrinho').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function fecharCarrinho(e) {
    if (e && e.target.id !== 'modal-carrinho') return;
    document.getElementById('modal-carrinho').style.display = 'none';
    document.body.style.overflow = 'auto';
}

function finalizarCompra() {
    if (carrinho.length === 0) {
        alert('Carrinho vazio!');
        return;
    }
    
    const total = carrinho.reduce((acc, item) => acc + (item.preco * item.quantidade), 0);
    const itens = carrinho.map(c => `${c.nome} (${c.quantidade}x) - R$ ${(c.preco * c.quantidade).toFixed(2)}`).join('\n');
    const mensagem = `Olá! Gostaria de comprar:\n\n${itens}\n\n*TOTAL: R$ ${total.toFixed(2)}*\n\nPor favor, confirme a disponibilidade e o prazo de entrega.`;
    
    window.open(`https://wa.me/5542999112756?text=${encodeURIComponent(mensagem)}`, '_blank');
    
    carrinho = [];
    atualizarCarrinho();
    fecharCarrinho();
}

function topo() { 
    window.scrollTo({top: 0, behavior: 'smooth'}); 
}

document.addEventListener('DOMContentLoaded', () => {
    renderProdutos();
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        fecharCarrinho();
    }
});

document.addEventListener('click', (e) => {
    const modal = document.getElementById('modal-carrinho');
    if (!modal.contains(e.target) && e.target.id !== 'carrinho-flutuante') {
        modal.style.display = 'none';
    }
});
</script>
